<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#3dd6f5" />
    <meta name="description" content="Track your drives, classify business vs personal, and maximize CRA deductions." />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MileIQ" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />
    <link rel="apple-touch-startup-image" href="%PUBLIC_URL%/icon-512.png" />

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>MileIQ – Mileage Tracker</title>

    <style>
      body { margin: 0; background: #0b1020; }
      /* iOS safe area support */
      #root { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('SW registered'))
            .catch((e) => console.log('SW failed:', e));
        });
      }
    </script>
  </body>
</html>
